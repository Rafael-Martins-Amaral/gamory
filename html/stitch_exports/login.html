<!DOCTYPE html>

<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Log In | Gamory</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&amp;family=Manrope:wght@400;500;600&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary-fixed": "#6CFF82",
            "inverse-surface": "#FFFFFF",
            "on-error": "#690005",
            "surface-container-low": "#14181C",
            "on-background": "#FFFFFF",
            "secondary-fixed": "#A0F6A3",
            "inverse-on-surface": "#14181C",
            "surface-bright": "#21282D",
            "on-tertiary-fixed-variant": "#723520",
            "surface-dim": "#101316",
            "on-tertiary": "#14181C",
            "on-primary-fixed": "#002106",
            "on-surface-variant": "#829AA8",
            "primary-container": "#00E054",
            "primary-fixed-dim": "#00E054",
            "tertiary": "#D8E0E5",
            "outline": "#2C363F",
            "outline-variant": "#38444D",
            "on-secondary-container": "#BDE5FF",
            "secondary-fixed-dim": "#85D989",
            "surface-container-lowest": "#0A0D0F",
            "on-secondary": "#000000",
            "secondary-container": "#004B73",
            "on-secondary-fixed-variant": "#00531A",
            "surface-container-high": "#2C363F",
            "surface-tint": "#00E054",
            "tertiary-container": "#2C363F",
            "on-primary-container": "#000000",
            "on-primary": "#000000",
            "on-surface": "#FFFFFF",
            "error-container": "#93000A",
            "surface": "#14181C",
            "on-tertiary-container": "#FFFFFF",
            "on-error-container": "#FFDAD6",
            "on-primary-fixed-variant": "#00531A",
            "error": "#FFB4AB",
            "inverse-primary": "#006e26",
            "surface-container-highest": "#38444D",
            "surface-variant": "#21282D",
            "primary": "#00E054",
            "tertiary-fixed": "#FFDBCF",
            "on-tertiary-fixed": "#390C00",
            "secondary": "#40BCF4",
            "on-secondary-fixed": "#002106",
            "surface-container": "#21282D",
            "background": "#14181C",
            "tertiary-fixed-dim": "#FFB59C"
          },
          fontFamily: {
            "headline": ["Outfit"],
            "body": ["Manrope"],
            "label": ["Manrope"],
            "display": ["Plus Jakarta Sans"]
          },
          borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
          boxShadow: {
            'poster': '0 8px 24px rgba(0,0,0,0.6)',
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .shadow-poster {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
    }

    .inset-glow {
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
  <!-- TopAppBar -->
  <nav
    class="fixed top-0 w-full flex justify-between items-center px-6 py-4 max-w-none bg-[#14181C] backdrop-blur-md bg-opacity-80 z-50 shadow-poster">
    <div class="flex items-center gap-8">
      <div class="flex items-center gap-2 hover:opacity-80 transition-opacity">
        <div class="size-7 text-primary">
          <svg fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z">
            </path>
          </svg>
        </div>
        <h1 class="font-logo text-2xl tracking-tight font-bold" style="color: #FFFFFF;">GAMORY</h1>
      </div>
    </div>
    <!-- Search Bar (Centered per request) -->
    <div class="hidden md:flex flex-1 max-w-md mx-8 relative">
      <span
        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">search</span>
      <input
        class="w-full bg-surface-container border-none focus:ring-1 focus:ring-primary text-sm py-2 pl-10 pr-4 rounded-lg placeholder:text-on-surface-variant/50"
        placeholder="Search games, logs, or users..." type="text" />
    </div>
    <div class="flex items-center gap-6">
      <a class="text-[#00E054] font-bold border-b-2 border-[#00E054] pb-1 font-headline text-sm" href="#">Log In</a>
      <a class="text-[#D8E0E5] hover:text-white transition-colors hover:scale-105 transition-all duration-200 font-headline text-sm"
        href="#">Sign Up</a>
    </div>
  </nav>
  <!-- Main Content Canvas -->
  <main class="flex-1 flex items-center justify-center pt-24 pb-12 px-6 relative overflow-hidden">
    <!-- Background Ambient Glow -->
    <div
      class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] pointer-events-none">
    </div>
    <!-- Login Card -->
    <div
      class="w-full max-w-[420px] bg-surface-container rounded-lg shadow-poster inset-glow relative z-10 overflow-hidden">
      <div class="p-8 md:p-10">
        <header class="mb-8 text-center">
          <h1 class="font-headline text-2xl font-bold tracking-tight mb-2">Welcome Back</h1>
          <p class="text-on-surface-variant text-[15px]">Log in to your kinetic archive.</p>
        </header>
        <!-- Form -->
        <form class="space-y-5">
          <div>
            <label
              class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2 font-label">Email
              Address</label>
            <input
              class="w-full bg-surface-variant border border-outline focus:border-primary focus:ring-0 text-on-surface py-3 px-4 rounded transition-colors text-[15px]"
              placeholder="name@example.com" type="email" />
          </div>
          <div>
            <div class="flex justify-between items-center mb-2">
              <label
                class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest font-label">Password</label>
              <a class="text-xs text-secondary hover:underline font-medium" href="#">Forgot password?</a>
            </div>
            <input
              class="w-full bg-surface-variant border border-outline focus:border-primary focus:ring-0 text-on-surface py-3 px-4 rounded transition-colors text-[15px]"
              placeholder="••••••••" type="password" />
          </div>
          <button
            class="w-full bg-primary text-on-primary font-headline font-black py-4 rounded tracking-[1.5px] uppercase text-sm hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-primary/20 mt-2"
            type="submit">
            Log In
          </button>
        </form>
        <div class="relative my-8">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-outline"></div>
          </div>
          <div class="relative flex justify-center text-xs uppercase tracking-widest">
            <span class="bg-surface-container px-4 text-on-surface-variant font-bold">Continue with</span>
          </div>
        </div>
        <!-- Social Logins -->
        <div class="grid grid-cols-2 gap-4">
          <button
            class="flex items-center justify-center gap-2 bg-surface-variant hover:bg-surface-container-high border border-outline py-3 px-4 rounded transition-all group">
            <img alt="Google" class="w-5 h-5 grayscale group-hover:grayscale-0 transition-all"
              data-alt="Official Google logo icon on a white background"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHVM8yXNNTTtAZxVjdREMreNtTuVuraT_-8ZL-2_WV_wHldMyH5oQ5PRZJtlBDxI4kjpxdgr2aH6sSVVqmhNnxVTjloUw6ENKI0oHJNvrSggvF1-Mn0TI-1fKedXkRruSvffwOdQ-GdkcJBqHQWj-xBJlJDl48qtH01lGymf91YnGDl4U_yfmo4tak2Xa8nRmX9L9egGHxiF8os6ueNOT4DiBgbbPa6Jun5RqDgqEh-ZdqFuVoXyGuFejiZmA8L2BH6X48KoXOpaA" />
            <span class="text-sm font-bold font-label">Google</span>
          </button>
          <button
            class="flex items-center justify-center gap-2 bg-surface-variant hover:bg-surface-container-high border border-outline py-3 px-4 rounded transition-all group">
            <span class="material-symbols-outlined text-secondary group-hover:scale-110 transition-transform"
              data-icon="discord">chat</span>
            <span class="text-sm font-bold font-label">Discord</span>
          </button>
        </div>
        <p class="mt-10 text-center text-[13px] text-on-surface-variant">
          New to Gamory?
          <a class="text-primary font-bold hover:underline ml-1" href="#">Create an account</a>
        </p>
      </div>
      <!-- Bottom Accent Line -->
      <div class="h-1 w-full bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>
    </div>
  </main>
  <!-- Footer -->
  <footer class="bg-[#14181C] border-t border-[#2C363F] py-12">
    <div class="w-full max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-8">
      <div class="flex flex-col items-center md:items-start gap-2">
        <span class="text-lg font-bold text-[#00E054] font-headline">Gamory</span>
        <p class="text-[13px] text-[#D8E0E5] font-body opacity-60">© 2024 Gamory. Kinetic Archive.</p>
      </div>
      <div class="flex gap-8">
        <a class="text-[13px] text-gray-500 hover:text-white transition-colors hover:underline font-body"
          href="#">Terms</a>
        <a class="text-[13px] text-gray-500 hover:text-white transition-colors hover:underline font-body"
          href="#">Privacy</a>
        <a class="text-[13px] text-gray-500 hover:text-white transition-colors hover:underline font-body"
          href="#">Support</a>
        <a class="text-[13px] text-gray-500 hover:text-white transition-colors hover:underline font-body"
          href="#">Contact</a>
      </div>
      <div class="flex gap-4">
        <span
          class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors cursor-pointer"
          data-icon="sports_esports">sports_esports</span>
        <span
          class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors cursor-pointer"
          data-icon="movie">movie</span>
        <span
          class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors cursor-pointer"
          data-icon="rss_feed">rss_feed</span>
      </div>
    </div>
  </footer>
</body>

</html>
