<!DOCTYPE html>

<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Write a Review - Gamory</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#06db54",
            "background-light": "#f5f8f6",
            "background-dark": "#0f2316",
            "surface": "#21282D",
            "muted": "#829AA8",
            "accent": "#40BCF4"
          },
          fontFamily: {
            "display": ["Manrope"]
          },
          borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
          boxShadow: {
            'hard': '0 24px 48px rgba(0,0,0,0.8)',
          }
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Manrope', sans-serif;
      background-color: #14181C;
      /* Main page background from PRD */
      color: #FFFFFF;
    }

    /* Modal Backdrop */
    .modal-backdrop {
      background-color: rgba(20, 24, 28, 0.85);
      /* Dark overlay */
    }

    /* Star Hover Logic (CSS-only approximation) */
    .star-group:hover .star-icon {
      color: #06db54;
      font-variation-settings: 'FILL' 1;
    }

    .star-group .star-wrapper:hover~.star-wrapper .star-icon {
      color: #2C363F;
      font-variation-settings: 'FILL' 0;
    }

    /* Custom Inputs */
    .gamory-input {
      background-color: #14181C;
      border: 1px solid #2C363F;
      color: #FFFFFF;
    }

    .gamory-input:focus {
      border-color: #06db54;
      outline: none;
      box-shadow: none;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-0 sm:p-4">
  <!-- Modal Backdrop -->
  <div class="fixed inset-0 modal-backdrop z-40 flex items-center justify-center p-0 sm:p-4">
    <!-- Modal Container -->
    <div
      class="bg-surface w-full h-full sm:h-auto sm:w-[600px] sm:rounded sm:shadow-hard flex flex-col z-50 overflow-hidden relative">
      <!-- Modal Header -->
      <header class="flex items-center justify-between px-6 py-4 border-b border-[#2C363F] shrink-0">
        <h2 class="text-white text-lg font-bold">Write a Review</h2>
        <button aria-label="Close modal"
          class="text-muted hover:text-white transition-colors cursor-pointer flex items-center justify-center p-1">
          <span class="material-symbols-outlined" data-icon="close" data-size="24px" data-weight="regular">close</span>
        </button>
      </header>
      <!-- Scrollable Content Area -->
      <div class="flex-1 overflow-y-auto p-6 space-y-8">
        <!-- Context Section: Game info -->
        <div class="flex items-center gap-4 bg-[#14181C]/50 p-4 rounded border border-[#2C363F]">
          <div
            class="w-16 aspect-[2/3] rounded overflow-hidden flex-shrink-0 border border-primary/50 shadow-lg shadow-primary/5">
            <img alt="Game cover art for Elden Ring" class="w-full h-full object-cover"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuA03apA2zVMpfaau24a5wT9AmGuJsoU30zLnqfFt793krW17CTd35fCQSr1ici0-Rrbfmyd0YzzmJ683FGEDASTIWt_j0x65mLr21KdYqe16Wgxq9mLi0wIbiIugcns2yQZZSV2B-H1D9vBr8E2lUZAkMrUkAaAS7J_riA5uYUvgdadQrbg23xchFk4NPufP_OlEPOb5wHDZ8o5S13756DpJx5qONilnS_QcFG1hAhwCpQvGggmJhDf-irLjfbTYknaZaWt4FPHyIg" />
          </div>
          <div>
            <p class="text-muted text-xs uppercase tracking-widest mb-1">Reviewing</p>
            <h3 class="text-xl font-bold text-white">Elden Ring</h3>
          </div>
        </div>
        <hr class="border-[#2C363F]" />
        <!-- Rating & Date Row -->
        <div class="flex flex-col sm:flex-row gap-6 justify-between">
          <!-- Rating Section -->
          <div class="space-y-2 flex-1">
            <label class="text-xs font-semibold uppercase tracking-wider text-muted">Your Rating</label>
            <div class="flex gap-1 star-group cursor-pointer">
              <div class="star-wrapper p-1"><span class="material-symbols-outlined star-icon text-[32px] text-primary"
                  data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span></div>
              <div class="star-wrapper p-1"><span class="material-symbols-outlined star-icon text-[32px] text-primary"
                  data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span></div>
              <div class="star-wrapper p-1"><span class="material-symbols-outlined star-icon text-[32px] text-primary"
                  data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span></div>
              <div class="star-wrapper p-1"><span class="material-symbols-outlined star-icon text-[32px] text-primary"
                  data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span></div>
              <div class="star-wrapper p-1"><span class="material-symbols-outlined star-icon text-[32px] text-[#2C363F]"
                  data-icon="star">star</span></div>
            </div>
          </div>
          <!-- Date Section -->
          <div class="space-y-2 flex-1 sm:text-right">
            <label class="text-xs font-semibold uppercase tracking-wider text-muted">Finished Playing</label>
            <div class="relative sm:justify-end flex">
              <input
                class="gamory-input rounded py-2 px-3 text-sm font-medium w-full sm:w-auto appearance-none cursor-pointer"
                type="date" value="2023-10-24" />
            </div>
          </div>
        </div>
        <!-- Review Text Section -->
        <div class="space-y-2">
          <label class="text-xs font-semibold uppercase tracking-wider text-muted flex justify-between">
            <span>Add your comment</span>
            <span class="text-muted/50 font-normal hidden sm:inline">Markdown supported</span>
          </label>
          <textarea autofocus=""
            class="w-full gamory-input rounded p-4 text-[15px] leading-relaxed resize-none min-h-[160px]"
            placeholder="What did you think of the game? Share your journey..."></textarea>
        </div>
      </div>
      <!-- Footer / Submit Action -->
      <div class="p-6 pt-0 mt-auto sm:mt-0 shrink-0">
        <button
          class="w-full bg-primary hover:bg-[#05c44a] text-[#14181C] font-bold uppercase tracking-[1.5px] py-4 rounded transition-colors flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-lg" data-icon="send"
            style="font-variation-settings: 'FILL' 1;">send</span>
          Post Review
        </button>
      </div>
    </div>
  </div>
</body>

</html>
